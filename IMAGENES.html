    <div id="cuadro-flotante">
        ¿Quieres añadir más?<br>
        escribe al: <strong>+591 72511274</strong>
    </div>

    <div id="visor-flotante" class="oculto">
        <button id="cerrar-visor">&times;</button>
        <img id="imagen-ampliada" src="" alt="Imagen ampliada">
    </div>

    <script>
        // --- 1. CUADRO FLOTANTE QUE DESAPARECE CON EL SCROLL ---
        const cuadroFlotante = document.getElementById('cuadro-flotante');

        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                cuadroFlotante.classList.add('oculto');
            } else {
                cuadroFlotante.classList.remove('oculto');
            }
        });

        // --- 2. NUEVO: LÓGICA PARA ABRIR LAS IMÁGENES AL TOCARLAS ---
        const imagenes = document.querySelectorAll('.cuadro-imagen img');
        const visorFlotante = document.getElementById('visor-flotante');
        const imagenAmpliada = document.getElementById('imagen-ampliada');
        const btnCerrarVisor = document.getElementById('cerrar-visor');

        // Escuchamos el clic/toque en cada imagen de la galería
        imagenes.forEach(img => {
            img.addEventListener('click', () => {
                imagenAmpliada.src = img.src; // Le pasa la foto que tocaste al visor
                visorFlotante.classList.remove('oculto'); // Lo muestra en pantalla
            });
        });

        // Escuchamos el clic en la "X" para cerrar
        btnCerrarVisor.addEventListener('click', () => {
            visorFlotante.classList.add('oculto');
        });
    </script>
